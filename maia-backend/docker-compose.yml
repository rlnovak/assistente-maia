services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Hot reload — código fonte
      - ./app:/app/app
      # ChromaDB persistente entre restarts
      - ./.chroma:/app/.chroma
      # data/ persistente (ingest state + summaries)
      - ./data:/app/data
      # docs/ persistente (inventory)
      - ./docs:/app/docs
      # knowledge/ read-only
      - "C:\\Users\\rlnov\\Projetos\\assistente-maia\\knowledge:/data/knowledge:ro"
    env_file:
      - ../.env
    environment:
      - CHROMA_PATH=/app/.chroma
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
