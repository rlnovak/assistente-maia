services:
  api:
    build:
      context: ./maia-backend
      dockerfile: Dockerfile.prod
    env_file: .env.prod
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
    restart: unless-stopped

networks:
  default:
    name: maia-net
